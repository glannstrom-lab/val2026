<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alla åtta riksdagspartier - ledare, ideologi, mandat och ståndpunkter inför valet 2026.">
  <meta name="theme-color" content="#0d0d0d">
  <title>Partierna — Val 2026</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=space-grotesk:400,500,600,700|inter:400,500,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
</head>
<body class="page-partier">
  <main id="main">
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Brödsmulor">
          <a href="index.html">Hem</a>
          <span>/</span>
          <span>Partierna</span>
        </nav>
        <h1>Partierna i riksdagen</h1>
        <p class="page-hero-subtitle">Åtta partier är representerade i Sveriges riksdag. Klicka på ett parti för mer information om partiledare, ideologi och aktuellt opinionsstöd.</p>
      </div>
    </section>

    <section class="parties-section">
      <div class="container">
        <div class="parties-grid" id="parties-grid">
          <!-- Parties loaded dynamically -->
        </div>
      </div>
    </section>

    <!-- Party Modal -->
    <div class="party-modal" id="party-modal" role="dialog" aria-modal="true" aria-labelledby="modal-party-name" hidden>
      <div class="party-modal-backdrop"></div>
      <div class="party-modal-content">
        <!-- Modal content rendered by app.js -->
      </div>
    </div>
  </main>

  <script src="shared/constants.js" defer></script>
  <script src="components/header.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
